name: Preview Build

on:
  push:
    branches:
      - feat/victorialogs-provider

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bellorr/blocky-ui

jobs:
  build-and-push:
    name: Build and Push Preview Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: BUILDER_PLATFORM=linux/amd64
          tags: ${{ env.IMAGE }}:victorialogs-preview
          cache-from: type=gha
          cache-to: type=gha,mode=max
