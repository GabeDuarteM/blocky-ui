name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CI: true
  GHCR_IMAGE: ghcr.io/gabeduartem/blocky-ui
  DOCKERHUB_IMAGE: gabrielduartem/blocky-ui

jobs:
  release:
    name: Changesets
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    permissions:
      contents: write
      packages: write
      pull-requests: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Dependencies
        run: bun install

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          publish: bun changeset publish
          commit: "chore: update versions"
          title: "Release new version"

      - name: Fix collaborator handles in release notes
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          set -euo pipefail
          for version in $(printf '%s' "$PUBLISHED_PACKAGES" | jq -r '.[].version'); do
            tag="v${version}"
            body=$(gh release view "$tag" --json body --jq '.body')
            # Replace [@handle](https://github.com/handle) with just @handle
            updated=$(printf '%s' "$body" | sed -E 's/\[@([a-zA-Z0-9_-]+)\]\(https:\/\/github\.com\/\1\)/@\1/g')
            if [ "$body" != "$updated" ]; then
              echo "Updating release notes for $tag"
              printf '%s' "$updated" | gh release edit "$tag" --notes-file -
            fi
          done

  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      fail-fast: true
      matrix:
        package: ${{ fromJson(needs.release.outputs.publishedPackages) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker Image Publish
        uses: ./.github/actions/publish-docker-image
        with:
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          dockerhub-username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub-password: ${{ secrets.DOCKERHUB_TOKEN }}
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:${{ matrix.package.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ matrix.package.version }}

  cleanup-failed-release:
    name: Cleanup Failed Release
    runs-on: ubuntu-latest
    needs:
      - release
      - publish-docker
    if: ${{ always() && needs.release.outputs.published == 'true' && needs.publish-docker.result == 'failure' }}
    permissions:
      contents: write

    steps:
      - name: Delete GitHub releases and tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED_PACKAGES: ${{ needs.release.outputs.publishedPackages }}
        run: |
          set -euo pipefail

          failed_tags=()

          for version in $(printf '%s' "$PUBLISHED_PACKAGES" | jq -r '.[].version'); do
            tag="v${version}"
            if ! release_id=$(gh api "repos/${GITHUB_REPOSITORY}/releases" --jq "map(select(.tag_name == \"${tag}\"))[0].id // empty"); then
              echo "Failed to look up release for $tag"
              failed_tags+=("$tag")
              release_id=""
            fi

            if [ -n "$release_id" ]; then
              echo "Deleting release for $tag"
              if ! gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"; then
                echo "Failed to delete release for $tag"
                failed_tags+=("$tag")
              fi
            fi

            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              echo "Deleting tag for $tag"
              if ! gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}"; then
                echo "Failed to delete tag for $tag"
                failed_tags+=("$tag")
              fi
            fi
          done

          if [ "${#failed_tags[@]}" -gt 0 ]; then
            printf 'Failed to clean up tags: %s\n' "${failed_tags[*]}"
            exit 1
          fi
