name: Publish Docker image
description: Build and publish container images.

inputs:
  context:
    description: Docker build context path.
    required: false
    default: "."
  dockerhub-password:
    description: DockerHub password or token. Omit to skip DockerHub login.
    required: false
  dockerhub-username:
    description: DockerHub username. Omit to skip DockerHub login.
    required: false
  ghcr-token:
    description: GitHub token with package write permission.
    required: true
  labels:
    description: Docker image labels.
    required: false
  tags:
    description: Docker image tags.
    required: true

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ inputs.ghcr-token }}

    - name: Log in to DockerHub
      if: inputs.dockerhub-username != '' && inputs.dockerhub-password != ''
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-password }}

    - name: Build and publish image
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        push: true
        platforms: linux/amd64,linux/arm64,linux/arm/v6,linux/arm/v7
        build-args: |
          BUILDER_PLATFORM=linux/amd64
          BUILDER_PLATFORM@linux/arm64=linux/arm64
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
